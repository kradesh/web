<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<style>
    body {
        background: linear-gradient(to right, #1e3c72, #2a5298);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .frame {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.3);
        text-align: center;
        width: 300px;
    }

    h2 {
        color: #2a5298;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        background: #2a5298;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 8px;
        width: 100%;
        cursor: pointer;
    }

    button:hover {
        background: #1e3c72;
    }
</style>
  
<script>
function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    // Change these credentials
    if(username === "admin" && password === "1234") {
        document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(to right,#11998e,#38ef7d);color:white;font-size:30px;">
                <h1>WELCOME 🎉</h1>
            </div>
        `;
    } else {
        alert("Wrong username or password");
    }
}
</script>

</head>
<body>

<div class="frame">
    
    <input type="text" id="username" placeholder="Enter Name"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>
  
</div>


</body>
</html>
