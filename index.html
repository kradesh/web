<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<script>
function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    // Change these credentials
    if(username === "admin" && password === "1234") {
        document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(to right,#11998e,#38ef7d);color:white;font-size:30px;">
                <h1><img src="image.jpeg"></h1>

            </div>
 <p> Hello, how you doing friend? </P>
        `;
    } else {
        alert("Wrong username or password");
    }
}
</script>
    
</head>
<body>

<div class="frame">
    
    <input type="text" id="username" placeholder="Enter Name"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>
  
</div>


</body>
</html>
